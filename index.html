<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#1E6B3C">
<title>สั่งผัก-ผลไม้ | ร้านสวนผักสด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1E6B3C;
    --green-dark:#14502B;
    --green-soft:#E7F1E7;
    --ink:#22301F;
    --muted:#71806C;
    --bg:#F7F8F3;
    --card:#FFFFFF;
    --line:#E2E7DD;
    --tag:#F4B942;
    --font-display:'Prompt',sans-serif;
    --font-body:'Sarabun',sans-serif;
  }
  :root{color-scheme:light only}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:#F7F8F3;overflow-x:clip}
  body{background:#F7F8F3;overflow-x:clip;position:relative;max-width:100%}
  input,select,textarea,button{max-width:100%;min-width:0}
  body{font-family:var(--font-body);color:var(--ink);font-size:16px;padding-bottom:96px}
  .wrap{max-width:520px;margin:0 auto}

  /* ---------- header ---------- */
  header{background:var(--green);color:#fff;padding:18px 16px 14px}
  .shop-name{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.2px}
  .shop-sub{font-size:13px;opacity:.85;margin-top:2px}
  .cutoff{margin-top:10px;background:rgba(255,255,255,.14);border:1px dashed rgba(255,255,255,.45);border-radius:8px;padding:7px 10px;font-size:13px;display:flex;gap:8px;align-items:center}

  /* ---------- search & chips ---------- */
  .sticky{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 16px 8px;border-bottom:1px solid var(--line)}
  .search{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:0 12px}
  .search:focus-within{border-color:var(--green)}
  .search svg{flex:none;opacity:.45}
  .search input{border:none;outline:none;background:none;font-family:var(--font-body);font-size:16px;padding:11px 10px;flex:1;width:auto;min-width:0}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 2px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:var(--font-display);font-weight:500;font-size:13.5px;padding:7px 14px;border-radius:99px;cursor:pointer}
  .chip.on{background:var(--green);border-color:var(--green);color:#fff}

  /* ---------- product list ---------- */
  .cat-head{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--green-dark);padding:18px 16px 8px;display:flex;align-items:center;gap:8px}
  .cat-head::after{content:"";flex:1;height:1px;background:var(--line)}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);margin:0 16px 8px;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .item-info{flex:1;min-width:0}
  .item-name{font-weight:600;font-size:15.5px}
  .item-price{font-size:13px;color:var(--muted);margin-top:1px}
  .stepper{display:flex;align-items:center;gap:2px;flex:none}
  .stepper button{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);color:var(--green);font-size:19px;font-weight:700;cursor:pointer;line-height:1}
  .stepper button:active{background:var(--green-soft)}
  .stepper .qty{min-width:52px;text-align:center;font-family:var(--font-display);font-weight:600;font-size:14.5px}
  .stepper .qty small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
  .item.picked{border-color:var(--green);background:#FBFDF9}
  .empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:14.5px}

  /* ---------- cart bar ---------- */
  .cartbar{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:10px 16px calc(12px + env(safe-area-inset-bottom))}
  .cartbar-inner{max-width:520px;margin:0 auto;background:var(--green-dark);color:#fff;border-radius:14px;display:flex;align-items:center;padding:13px 16px;cursor:pointer;box-shadow:0 6px 24px rgba(20,80,43,.35)}
  .cart-count{background:var(--tag);color:var(--green-dark);font-family:var(--font-display);font-weight:700;font-size:13px;border-radius:99px;padding:3px 10px;margin-right:10px}
  .cart-label{font-family:var(--font-display);font-weight:600;font-size:15px;flex:1}
  .cart-total{font-family:var(--font-display);font-weight:700;font-size:17px}
  .cartbar.hide{display:none}

  /* ---------- summary sheet ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,30,18,.5);z-index:40;display:none}
  .overlay.show{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:18px 18px 0 0;max-height:92dvh;display:none;flex-direction:column;max-width:520px;margin:0 auto;width:100%}
  .sheet.show{display:flex}
  .sheet-head{padding:14px 18px 10px;display:flex;align-items:center;border-bottom:1px solid var(--line)}
  .sheet-title{font-family:var(--font-display);font-weight:700;font-size:17px;flex:1}
  .close{border:none;background:var(--green-soft);color:var(--green);width:32px;height:32px;border-radius:9px;font-size:16px;cursor:pointer}
  .sheet-body{overflow-y:auto;padding:14px 18px 24px}
  .field{margin-bottom:12px}
  .field label{display:block;font-family:var(--font-display);font-weight:600;font-size:13.5px;margin-bottom:5px;color:var(--green-dark)}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;background:var(--card);font-family:var(--font-body);font-size:16px;padding:10px 12px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
  .field textarea{resize:vertical;min-height:64px}
  .field input[type="date"]{-webkit-appearance:none;appearance:none;display:block;width:100%;min-width:0;max-width:100%;min-height:46px;text-align:left}
  .field input[type="date"]::-webkit-date-and-time-value{text-align:left}
  .sheet-body{overflow-x:hidden}

  /* receipt = signature element */
  .receipt{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:16px 16px 14px;margin:16px 0 14px;position:relative;font-size:14.5px;
    -webkit-mask:linear-gradient(#000 0 0) padding-box;
    box-shadow:0 2px 10px rgba(34,48,31,.07)}
  .receipt::before,.receipt::after{content:"";position:absolute;left:0;right:0;height:8px;
    background-image:radial-gradient(circle at 6px 0,transparent 5px,var(--card) 5px);background-size:12px 8px;background-repeat:repeat-x}
  .receipt::before{top:-7px;transform:rotate(180deg)}
  .receipt::after{bottom:-7px}
  .r-head{text-align:center;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.5px;color:var(--green-dark)}
  .r-sub{text-align:center;font-size:12px;color:var(--muted);margin:2px 0 10px}
  .r-line{border:none;border-top:1.5px dashed var(--line);margin:8px 0}
  .r-row{display:flex;justify-content:space-between;gap:10px;padding:3px 0}
  .r-row .n{flex:1}
  .r-row .q{color:var(--muted);white-space:nowrap}
  .r-row .p{font-weight:600;white-space:nowrap}
  .r-total{display:flex;justify-content:space-between;font-family:var(--font-display);font-weight:700;font-size:16.5px;padding-top:6px}
  .actions{display:grid;gap:10px}
  .btn{border:none;border-radius:12px;font-family:var(--font-display);font-weight:600;font-size:16px;padding:14px;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn-line{background:#06C755;color:#fff}
  .btn-copy{background:var(--green);color:#fff}
  .btn-ghost{background:none;color:var(--muted);font-size:14px;padding:8px}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:110px;background:var(--ink);color:#fff;font-size:14px;padding:10px 18px;border-radius:99px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="shop-name">🥬 ร้านสวนผักสด</div>
    <div class="shop-sub">ผัก-ผลไม้สดใหม่ ส่งตรงถึงครัวร้านคุณ</div>
    <div class="cutoff">⏰ สั่งก่อน 19:00 น. — ส่งเช้าวันถัดไป (ส่งฟรีในระยะ 10 กิโลเมตร)</div>
  </header>

  <div class="sticky">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#22301F" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="#22301F" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="q" type="search" placeholder="ค้นหาสินค้า เช่น คะน้า, มะนาว…" oninput="render()">
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <main id="list"></main>

</div>

<div class="cartbar hide" id="cartbar" onclick="openSheet()">
  <div class="cartbar-inner">
    <span class="cart-count" id="cartCount">0 รายการ</span>
    <span class="cart-label">ดูสรุปออเดอร์</span>
    <span class="cart-total" id="cartTotal">0 ฿</span>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="สรุปออเดอร์">
  <div class="sheet-head">
    <div class="sheet-title">สรุปออเดอร์</div>
    <button class="close" onclick="closeSheet()" aria-label="ปิด">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label for="shop">ชื่อร้าน / ลูกค้า <span style="color:#C0392B">*</span></label>
      <input id="shop" type="text" required placeholder="พิมพ์ชื่อร้านของคุณ เช่น ครัวริมปิง" autocomplete="organization">
    </div>
    <div class="field">
      <label for="date">วันที่รับของ</label>
      <input id="date" type="date">
    </div>
    <div class="field">
      <label for="note">หมายเหตุ</label>
      <textarea id="note" placeholder="เช่น ขอมะเขือเทศลูกแข็ง / แบ่งถุงละ 2 กก."></textarea>
    </div>

    <div class="receipt" id="receipt"></div>

    <div class="actions">
      <button class="btn btn-line" onclick="sendLine()">ส่งออเดอร์ทาง LINE</button>
      <button class="btn btn-copy" onclick="copyOrder()">คัดลอกข้อความออเดอร์</button>
      <button class="btn btn-ghost" onclick="clearCart()">ล้างตะกร้า</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= config ================= */
// วิธีเชื่อม Google Sheet: วางรหัสชีทระหว่างเครื่องหมายคำพูดด้านล่าง
// (รหัสชีทคือตัวอักษรยาวๆ ใน URL ระหว่าง /d/ กับ /edit)
// ชีทต้องมีหัวตาราง: หมวด | สินค้า | ราคา | หน่วย | ขั้นเพิ่ม
// และตั้งค่าแชร์เป็น "ทุกคนที่มีลิงก์ - ผู้มีสิทธิ์ดู"
const SHEET_ID = "1ihPCg3VKhS59B5RrlKuvFZi9IsZesESkXmrb02cS-84";

/* ================= data (ใช้เมื่อยังไม่เชื่อมชีท หรือโหลดชีทไม่สำเร็จ) ================= */
let PRODUCTS = [
  // ผักใบ
  {c:"ผักใบ",n:"คะน้า",p:40,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ผักบุ้งจีน",p:30,u:"กก.",s:0.5},

  {c:"ผักใบ",n:"กะหล่ำปลี",p:25,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ผักสลัดกรีนโอ๊ค",p:80,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ขึ้นฉ่าย",p:60,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ต้นหอม",p:50,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ผักชี",p:80,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ผักชีลาว",p:60,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"โหระพา",p:50,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"กะเพรา",p:50,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"สะระแหน่",p:60,u:"กก.",s:0.5},
  {c:"ผักใบ",n:"ชะอม",p:55,u:"กก.",s:0.5},
  // ผักหัว-ผล
  {c:"ผักหัว-ผล",n:"มะเขือเทศ",p:35,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"มะเขือเทศราชินี",p:60,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"แครอท",p:30,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"หอมใหญ่",p:35,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"หอมแดง",p:70,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"มันฝรั่ง",p:35,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"แตงกวา",p:25,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"ฟักทอง",p:25,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"ฟักเขียว",p:20,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"มะเขือเปราะ",p:35,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"มะเขือยาว",p:30,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"บวบ",p:30,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"ถั่วฝักยาว",p:45,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"ถั่วงอก",p:20,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"ข้าวโพดหวาน",p:30,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"หน่อไม้ฝรั่ง",p:120,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"บรอกโคลี",p:60,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"กะหล่ำดอก",p:45,u:"กก.",s:0.5},
  {c:"ผักหัว-ผล",n:"พริกหวานสามสี",p:90,u:"กก.",s:0.5},
  // พริก-เครื่องแกง
  {c:"พริก-เครื่องแกง",n:"พริกขี้หนูสวน",p:120,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"พริกจินดาแดง",p:80,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"พริกชี้ฟ้า",p:60,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"กระเทียม",p:90,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"ขิง",p:45,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"ข่า",p:40,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"ตะไคร้",p:35,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"ใบมะกรูด",p:100,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"ขมิ้นสด",p:50,u:"กก.",s:0.5},
  {c:"พริก-เครื่องแกง",n:"กระชาย",p:60,u:"กก.",s:0.5},
  // เห็ด
  {c:"เห็ด",n:"เห็ดฟาง",p:70,u:"กก.",s:0.5},
  {c:"เห็ด",n:"เห็ดนางฟ้า",p:50,u:"กก.",s:0.5},
  {c:"เห็ด",n:"เห็ดหอมสด",p:120,u:"กก.",s:0.5},
  {c:"เห็ด",n:"เห็ดเข็มทอง",p:15,u:"แพ็ค",s:1},
  {c:"เห็ด",n:"เห็ดออรินจิ",p:90,u:"กก.",s:0.5},
  // ผลไม้
  {c:"ผลไม้",n:"มะนาว",p:3,u:"ลูก",s:5},
  {c:"ผลไม้",n:"มะละกอดิบ",p:25,u:"กก.",s:0.5},
  {c:"ผลไม้",n:"มะละกอสุก",p:35,u:"กก.",s:0.5},
  {c:"ผลไม้",n:"กล้วยน้ำว้า",p:25,u:"หวี",s:1},
  {c:"ผลไม้",n:"สับปะรดภูแล",p:30,u:"ลูก",s:1},
  {c:"ผลไม้",n:"แตงโม",p:20,u:"กก.",s:1},
  {c:"ผลไม้",n:"ส้มสายน้ำผึ้ง",p:60,u:"กก.",s:0.5},
];
let CATS = [];
function rebuildCats(){ CATS = ["ทั้งหมด", ...new Set(PRODUCTS.map(p=>p.c))]; }
rebuildCats();
let cart = {};        // name -> qty
let activeCat = "ทั้งหมด";

/* ================= helpers ================= */
const fmt = n => n % 1 === 0 ? n.toLocaleString("th-TH") : n.toLocaleString("th-TH",{minimumFractionDigits:1,maximumFractionDigits:1});
const money = n => n.toLocaleString("th-TH") + " ฿";
const find = name => PRODUCTS.find(p=>p.n===name);
function cartTotal(){ return Object.entries(cart).reduce((s,[n,q])=>s+find(n).p*q,0); }
function cartCount(){ return Object.keys(cart).length; }

/* ================= render ================= */
function renderChips(){
  document.getElementById("chips").innerHTML = CATS.map(c=>
    `<button class="chip ${c===activeCat?"on":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}
function setCat(c){ activeCat=c; renderChips(); render(); }

function render(){
  const q = document.getElementById("q").value.trim();
  let items = PRODUCTS.filter(p =>
    (activeCat==="ทั้งหมด"||p.c===activeCat) && (!q||p.n.includes(q)));
  const list = document.getElementById("list");
  if(!items.length){ list.innerHTML = `<div class="empty">ไม่พบ "${q}" — ลองพิมพ์ชื่ออื่น หรือแจ้งเพิ่มในหมายเหตุตอนสรุปออเดอร์ได้เลย</div>`; updateBar(); return; }
  let html = "", lastCat = "";
  for(const p of items){
    if(p.c!==lastCat){ html += `<div class="cat-head">${p.c}</div>`; lastCat=p.c; }
    const qty = cart[p.n]||0;
    html += `
    <div class="item ${qty?"picked":""}">
      <div class="item-info">
        <div class="item-name">${p.n}</div>
        <div class="item-price">${p.p} บาท/${p.u}</div>
      </div>
      <div class="stepper">
        <button aria-label="ลด ${p.n}" onclick="step('${p.n}',-1)">−</button>
        <span class="qty">${qty?fmt(qty):"–"}<small>${p.u}</small></span>
        <button aria-label="เพิ่ม ${p.n}" onclick="step('${p.n}',1)">+</button>
      </div>
    </div>`;
  }
  list.innerHTML = html;
  updateBar();
}

function step(name,dir){
  const p = find(name);
  const next = Math.max(0, +( (cart[name]||0) + dir*p.s ).toFixed(1));
  if(next===0) delete cart[name]; else cart[name]=next;
  render();
}

function updateBar(){
  const bar = document.getElementById("cartbar");
  if(!cartCount()){ bar.classList.add("hide"); return; }
  bar.classList.remove("hide");
  document.getElementById("cartCount").textContent = cartCount()+" รายการ";
  document.getElementById("cartTotal").textContent = money(cartTotal());
}

/* ================= sheet ================= */
function openSheet(){
  renderReceipt();
  document.getElementById("overlay").classList.add("show");
  document.getElementById("sheet").classList.add("show");
}
function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("sheet").classList.remove("show");
}
function renderReceipt(){
  const rows = Object.entries(cart).map(([n,q])=>{
    const p = find(n);
    return `<div class="r-row"><span class="n">${n}</span><span class="q">${fmt(q)} ${p.u} × ${p.p}</span><span class="p">${money(p.p*q)}</span></div>`;
  }).join("");
  document.getElementById("receipt").innerHTML = `
    <div class="r-head">ใบสั่งซื้อ — ร้านสวนผักสด</div>
    <div class="r-sub">สั่งก่อน 19:00 น. ส่งเช้าวันถัดไป</div>
    <hr class="r-line">${rows}<hr class="r-line">
    <div class="r-total"><span>รวมทั้งหมด</span><span>${money(cartTotal())}</span></div>`;
}
function orderText(){
  const shop = document.getElementById("shop").value.trim() || "(ไม่ระบุชื่อร้าน)";
  const date = document.getElementById("date").value || "พรุ่งนี้";
  const note = document.getElementById("note").value.trim();
  let t = `รายการสั่งซื้อ\nออเดอร์: ${shop}\nรับของ: ${date}\n———————\n`;
  for(const [n,q] of Object.entries(cart)){
    const p = find(n);
    t += `• ${n} ${fmt(q)} ${p.u} = ${p.p*q} บาท\n`;
  }
  t += `———————\n💰 รวม ${cartTotal().toLocaleString("th-TH")} บาท`;
  if(note) t += `\n📝 ${note}`;
  return t;
}
function requireShopName(){
  const shopInput = document.getElementById("shop");
  if(!shopInput.value.trim()){
    shopInput.focus();
    toast("กรุณากรอกชื่อร้าน/ลูกค้าก่อนส่งออเดอร์");
    return false;
  }
  return true;
}
function copyOrder(){
  if(!requireShopName()) return;
  navigator.clipboard.writeText(orderText())
    .then(()=>toast("คัดลอกแล้ว วางส่งใน LINE ได้เลย ✓"))
    .catch(()=>toast("คัดลอกไม่สำเร็จ ลองกดค้างเลือกข้อความแทน"));
}
function sendLine(){
  if(!requireShopName()) return;
  const url = "https://line.me/R/oaMessage/%40746wpose/?" + encodeURIComponent(orderText());
  copyOrder();
  window.open(url,"_blank");
}
function clearCart(){ cart={}; closeSheet(); render(); toast("ล้างตะกร้าแล้ว"); }

let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"),2200);
}

/* ================= Google Sheet prices ================= */
async function loadPrices(){
  if(!SHEET_ID) return;
  try{
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
    const text = await (await fetch(url)).text();
    const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
    // หาตำแหน่งคอลัมน์จากชื่อหัวตาราง (สลับลำดับคอลัมน์ในชีทได้อิสระ)
    const labels = json.table.cols.map(c=>String(c.label||"").trim());
    const col = names => labels.findIndex(l=>names.some(n=>l.includes(n)));
    const iC = col(["หมวด"]);
    const iN = col(["ชื่อสินค้า","สินค้า","รายการ"]);
    const iP = col(["ราคา"]);
    const iU = col(["หน่วย"]);
    const iS = col(["ขั้น","ส่วนเพิ่ม","เพิ่ม"]);
    if(iC<0||iN<0||iP<0){ console.warn("หาหัวตาราง หมวด/สินค้า/ราคา ในชีทไม่เจอ"); return; }
    const val = (r,i)=> (i>=0 && r.c && r.c[i] && r.c[i].v!=null) ? r.c[i].v : null;
    const items = json.table.rows.map(r=>({
      c: String(val(r,iC)||"").replace(/^หมวด/,"").trim(),
      n: String(val(r,iN)||"").trim(),
      p: Number(val(r,iP)||0),
      u: String(val(r,iU)||"กก.").trim(),
      s: Number(val(r,iS)||0.5)
    })).filter(x=>x.c && x.n && x.p>0 && x.s>0);
    if(!items.length) return;
    PRODUCTS = items;
    rebuildCats();
    if(!CATS.includes(activeCat)) activeCat = "ทั้งหมด";
    // ลบของในตะกร้าที่ไม่มีขายแล้ว
    for(const n of Object.keys(cart)) if(!find(n)) delete cart[n];
    renderChips(); render();
    toast("อัปเดตราคาล่าสุดแล้ว ✓");
  }catch(e){
    console.warn("โหลดราคาจากชีทไม่สำเร็จ ใช้ราคาสำรองในเว็บแทน", e);
  }
}

/* ================= init ================= */
(function(){
  const d = new Date(); d.setDate(d.getDate()+1);
  const minDate = d.toISOString().slice(0,10);
  const dateInput = document.getElementById("date");
  dateInput.value = minDate;
  dateInput.min = minDate; // ห้ามเลือกวันนี้หรือย้อนหลัง เลือกได้ตั้งแต่พรุ่งนี้เป็นต้นไป
  renderChips(); render();
  loadPrices();
})();
</script>
